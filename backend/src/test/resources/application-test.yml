spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password: password
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
  sql:
    init:
      mode: always

app:
  jwt:
    secret: 5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
    expiration-ms: 10000
  storage:
    upload-dir: ./target/test-uploads
    faces-dir: ${app.storage.upload-dir}/faces
    snapshots-dir: ${app.storage.upload-dir}/snapshots
  opencv:
    cascade-path: ./target/test-classes/haarcascade_frontalface_alt.xml
    onnx-model-path: ./target/test-classes/face_recognizer_fast.onnx
    similarity-threshold: 0.75
