version: '3.8'

services:
  # MySQL 8 Database Server
  db:
    image: mysql:8.0
    container_name: facesecure_db
    restart: always
    environment:
      MYSQL_DATABASE: facesecureai
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # Automatically seed schema and insert baseline admin credentials
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Spring Boot REST API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: facesecure_backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/facesecureai?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=password
      - APP_STORAGE_UPLOAD-DIR=/var/facesecureai/data
    volumes:
      - biometric_data:/var/facesecureai/data
    depends_on:
      db:
        condition: service_healthy

  # React + Nginx Static Server
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: facesecure_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  biometric_data:
